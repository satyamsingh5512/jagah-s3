<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Jagah | Ephemeral S3 Vault</title>
    <style>
      body { background-color: #000; color: #fff; margin: 0; display: flex; align-items: center; justify-content: center; min-height: 100vh; font-family: -apple-system, BlinkMacSystemFont, sans-serif; }
      #initial-loader { display: flex; flex-direction: column; align-items: center; gap: 1.5rem; opacity: 1; transition: opacity 0.5s ease; }
      .db-icon { width: 40px; height: 40px; animation: bounceDb 1.5s cubic-bezier(0.28, 0.84, 0.42, 1) infinite alternate; color: #fff; }
      @keyframes bounceDb {
        0% { transform: translateY(0) scale(1); opacity: 0.7; }
        100% { transform: translateY(-10px) scale(1.05); opacity: 1; }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div id="initial-loader">
        <svg class="db-icon" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <ellipse cx="12" cy="5" rx="9" ry="3"></ellipse>
          <path d="M3 5V19A9 3 0 0 0 21 19V5"></path>
          <path d="M3 12A9 3 0 0 0 21 12"></path>
        </svg>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
